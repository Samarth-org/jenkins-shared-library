name: Run Tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # ← upgraded v3 to v4

      - uses: actions/setup-node@v4      # ← upgraded v3 to v4
        with:
          node-version: '20'

      - name: Install Dependencies      
        run: npm install --no-audit

      - name: Run Tests
        run: npm test
