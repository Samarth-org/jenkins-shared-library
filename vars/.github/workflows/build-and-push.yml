name: Build and Push Docker

on:
  workflow_call:             # makes it reusable
    inputs:
      image_name:            # parameter 1
        required: true
        type: string
      tag:                   # parameter 2
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:       # secrets passed from caller
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ inputs.image_name }}:${{ inputs.tag }} .
          docker push ${{ inputs.image_name }}:${{ inputs.tag }}